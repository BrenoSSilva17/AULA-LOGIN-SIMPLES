<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login SENAI</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #002b5b, #004080);
    }

    .container{
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      animation: fade 0.6s ease;
    }

    @keyframes fade{
      from{
        opacity: 0;
        transform: translateY(20px);
      }

      to{
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top-bar{
      width: 100%;
      height: 8px;
      background: #e30613;
      position: absolute;
      top: 0;
      left: 0;
    }

    .logo{
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1{
      color: #003366;
      font-size: 34px;
      margin-bottom: 5px;
    }

    .logo p{
      color: #666;
      font-size: 14px;
    }

    form{
      display: flex;
      flex-direction: column;
    }

    label{
      color: #003366;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input{
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus{
      border-color: #004aad;
      outline: none;
      box-shadow: 0 0 8px rgba(0,74,173,0.3);
    }

    button{
      padding: 15px;
      background: #004aad;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #003b8a;
      transform: scale(1.02);
    }

    .extra-links{
      margin-top: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .extra-links a{
      text-decoration: none;
      color: #004aad;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s;
    }

    .extra-links a:hover{
      color: #002b5b;
      text-decoration: underline;
    }

    @media (max-width: 500px){

      .container{
        margin: 20px;
        padding: 30px 25px;
      }

      .logo h1{
        font-size: 28px;
      }

    }
  </style>
</head>
<body>

  <div class="container">

    <div class="top-bar"></div>

    <div class="logo">
      <h1>SENAI</h1>
      <p>Sistema de Login</p>
    </div>

    <form action="/login" method="post">

      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Digite seu email"
        required
      >

      <label for="senha">Senha</label>
      <input
        type="password"
        id="senha"
        name="senha"
        placeholder="Digite sua senha"
        required
      >

      <button type="submit">
        Entrar
      </button>

    </form>

    <div class="extra-links">
      <a href="/cadastro">Criar conta</a>
      <a href="#">Esqueci minha senha</a>
    </div>

  </div>

</body>
</html>
